<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LURAX TITAN | 30-GACOR OMEGA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Fira+Code:wght@500&family=Syncopate:wght@700&display=swap');
        
        :root { --red: #ff003c; --bg: #050505; --white: #ffffff; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--white); font-family: 'Orbitron', sans-serif; overflow-x: hidden; height: 100vh; cursor: crosshair; }

        /* 11. Glitch Effect */
        .glitch { position: relative; font-family: 'Syncopate'; font-weight: 900; }
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch::before { left: 2px; text-shadow: -2px 0 red; clip: rect(44px, 450px, 56px, 0); animation: gl 3s infinite linear; }

        /* 5. Vinyl & 6. Visualizer */
        .vinyl-disk { width: 220px; height: 220px; background: #000; border-radius: 50%; border: 4px solid #111; animation: spin 2s linear infinite paused; position: relative; box-shadow: 0 0 40px var(--red); }
        .vinyl-disk.playing { animation-play-state: running; }
        .vinyl-disk::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: url('https://files.catbox.moe/ngkxof.jpg'); background-size: cover; border-radius: 50%; border: 3px solid var(--red); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Layout Scroll System */
        .scroll-wrapper { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .section { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        .scroll-wrapper::-webkit-scrollbar { display: none; }

        /* 13. Toast & 16. Particle */
        #toast { position: fixed; top: 100px; right: 20px; background: black; border-left: 4px solid var(--red); padding: 15px; font-size: 8px; transform: translateX(200%); transition: 0.5s; z-index: 10000; }
        #toast.show { transform: translateX(0); }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--red); pointer-events: none; border-radius: 50%; z-index: 10000; }

        /* 4. Strobe */
        .strobe { animation: flash 0.1s infinite alternate; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.8; } }

        #matrix-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }
        .glass { background: rgba(0,0,0,0.9); border: 1px solid rgba(255,0,60,0.3); backdrop-filter: blur(10px); }
    </style>
</head>
<body onload="initAll()">

    <canvas id="matrix-canvas"></canvas>
    <audio id="bgm" loop><source src="https://files.catbox.moe/0udojg.mp3" type="audio/mpeg"></audio>

    <div id="loader" class="fixed inset-0 bg-black z-[50000] flex flex-col items-center justify-center p-10 font-mono">
        <div class="glitch text-3xl mb-4" data-text="LURAX_TITAN">LURAX_TITAN</div>
        <div id="log" class="text-[9px] text-red-600 mb-6 h-24 overflow-hidden"></div>
        <div class="w-64 h-1 bg-neutral-900"><div id="bar" class="h-full bg-red-600 w-0"></div></div>
    </div>

    <div id="auth" class="fixed inset-0 z-[40000] hidden flex flex-col items-center justify-center bg-black">
        <div class="w-32 h-32 border border-white/10 mb-8 flex items-center justify-center relative" onclick="startApp()">
            <i class="fas fa-fingerprint text-6xl text-red-600 animate-pulse"></i>
            <div class="absolute w-full h-1 bg-red-600 shadow-[0_0_15px_red] animate-bounce top-0"></div>
        </div>
        <div class="text-[10px] tracking-[5px] text-white/50 uppercase">Authenticate Pilot</div>
    </div>

    <div id="app" class="hidden scroll-wrapper">
        
        <header class="fixed top-0 w-full p-5 flex justify-between items-center z-[10000] glass border-b border-red-600/20">
            <div class="text-xs font-black text-red-600">TITAN_V10</div>
            <div class="flex gap-4 text-[8px] font-mono">
                <span>IP: <span id="ip">112.91.*.*</span></span>
                <span class="text-green-500">PING: <span id="ping">12ms</span></span>
                <span class="text-red-500">LIVE: <span id="visitors">2,401</span></span>
            </div>
        </header>

        <div class="fixed top-20 left-1/2 -translate-x-1/2 z-[500]">
            <span class="bg-red-600 text-white text-[8px] px-3 py-1 font-bold">PROMO VVIP: <span id="timer">05:00</span></span>
        </div>

        <div id="toast">SYSTEM: <span id="msg">New Order!</span></div>

        <section class="section">
            <div class="glass p-10 w-[300px] text-center relative">
                <div class="text-[8px] mb-4 text-red-600" id="greet">GOOD NIGHT, PILOT</div>
                <div class="relative w-28 h-28 mx-auto mb-6" onclick="copyID()">
                    <img src="https://files.catbox.moe/ngkxof.jpg" class="w-full h-full object-cover border-2 border-red-600">
                    <i class="fas fa-crown absolute -top-4 -right-4 text-yellow-500 animate-bounce"></i>
                </div>
                <h2 class="text-xl font-black italic">LURAX & QUEEN</h2>
                <div id="copy-note" class="text-[7px] text-green-500 mt-2 opacity-0">ID COPIED</div>
            </div>
        </section>

        <section class="section">
            <div class="glass p-8 w-[340px] flex flex-col items-center">
                <div class="vinyl-disk mb-8" id="vinyl"></div>
                <div id="viz" class="flex items-end h-16 gap-1 mb-8"></div>
                <button onclick="playMusic()" class="bg-white text-black w-16 h-16 rounded-full text-2xl shadow-[0_0_20px_white]">
                    <i id="ctrl" class="fas fa-play"></i>
                </button>
            </div>
        </section>

        <section class="section">
            <div class="glass w-[340px] p-6 h-[400px] flex flex-col">
                <div class="text-[9px] mb-4 font-bold border-b border-red-600 pb-2">NEURAL_AI_v10</div>
                <div id="chat" class="flex-grow overflow-y-auto text-[9px] font-mono space-y-3 pr-2"></div>
                <div class="flex gap-2 mt-4">
                    <input id="input" type="text" placeholder="Command..." class="bg-white/5 border border-white/20 p-3 text-[9px] flex-grow">
                    <button onclick="ai()" class="bg-red-600 px-4 text-[10px]"><i class="fas fa-code"></i></button>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="glass p-8 w-[310px]">
                <div class="text-[10px] font-black mb-6">SYSTEM MONITOR</div>
                <div class="space-y-4 mb-8">
                    <div class="text-[8px]">CPU USAGE: <div class="w-full h-1 bg-white/10 mt-1"><div class="h-full bg-red-600" style="width: 78%"></div></div></div>
                    <div class="text-[8px]">RANK INJECTION: <div class="w-full h-1 bg-white/10 mt-1"><div id="rank-bar" class="h-full bg-white w-0 transition-all"></div></div></div>
                </div>
                <a href="https://wa.me/6288902072245" class="block bg-red-600 py-4 text-center text-[10px] font-black tracking-widest">ORDER NOW</a>
            </div>
        </section>

        <a href="https://wa.me/6288902072245" class="fixed bottom-10 right-10 w-14 h-14 bg-green-600 rounded-full flex items-center justify-center text-2xl z-[5000] animate-bounce"><i class="fab fa-whatsapp"></i></a>
    </div>

    <script>
        // 1. LOADER & 2. AUTH
        function initAll() {
            let i = 0; const logs = ["> Booting...", "> Loading 30 Features...", "> Syncing MP3...", "> System Ready."];
            const t = setInterval(() => {
                if(i < logs.length) {
                    document.getElementById('log').innerHTML += logs[i] + "<br>";
                    document.getElementById('bar').style.width = ((i+1)*25) + "%";
                    i++;
                } else {
                    clearInterval(t); document.getElementById('loader').style.display='none'; document.getElementById('auth').style.display='flex';
                }
            }, 600);
            
            // 22. Greeting
            const h = new Date().getHours();
            const g = h<12 ? "GOOD MORNING" : h<18 ? "GOOD AFTERNOON" : "GOOD NIGHT";
            document.getElementById('greet').innerText = g + ", PILOT";
        }

        function startApp() {
            document.getElementById('auth').style.display='none';
            document.getElementById('app').classList.remove('hidden');
            startMatrix(); startSims();
        }

        // 5 & 6. MUSIC ENGINE
        const audio = document.getElementById('bgm');
        function playMusic() {
            const v = document.getElementById('vinyl');
            const c = document.getElementById('ctrl');
            if(audio.paused) { 
                audio.play(); v.classList.add('playing'); c.className = "fas fa-pause"; 
                document.body.classList.add('strobe'); // 4. Strobe
            } else { 
                audio.pause(); v.classList.remove('playing'); c.className = "fas fa-play";
                document.body.classList.remove('strobe');
            }
        }

        // Visualizer (6)
        const vCont = document.getElementById('viz');
        for(let i=0; i<15; i++) { const b = document.createElement('div'); b.className = 'viz-bar'; vCont.appendChild(b); }
        setInterval(() => {
            if(!audio.paused) {
                document.querySelectorAll('.viz-bar').forEach(b => b.style.height = Math.random()*100 + "%");
            }
        }, 100);

        // 7. AI & 30. Auto-Type
        function ai() {
            const inp = document.getElementById('input');
            const box = document.getElementById('chat');
            if(!inp.value) return;
            box.innerHTML += `<div class="text-right">> ${inp.value}</div>`;
            const v = inp.value.toLowerCase(); inp.value = "";
            setTimeout(() => {
                let r = "Titan: System override active.";
                if(v.includes("joki")) r = "Status: Online. Slot Legends available.";
                box.innerHTML += `<div class="text-red-500">TITAN_AI: ${r}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 500);
        }

        // 8, 9, 13, 14, 25. SIMULATORS
        function startSims() {
            let t = 300;
            setInterval(() => {
                // 25. Timer
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
                if(t>0) t--;
                // 8 & 9. Stats
                document.getElementById('ping').innerText = Math.floor(Math.random()*20+5)+"ms";
                document.getElementById('visitors').innerText = (2400+Math.floor(Math.random()*50)).toLocaleString();
                // 14. Rank Bar
                let rb = document.getElementById('rank-bar');
                let w = parseInt(rb.style.width) || 0;
                rb.style.width = w<100 ? (w+10)+"%" : "0%";
            }, 1000);

            // 13. Toast
            setInterval(() => {
                const toast = document.getElementById('toast');
                document.getElementById('msg').innerText = "Order Legend Success!";
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }, 10000);
        }

        // 12. Copy
        function copyID() {
            navigator.clipboard.writeText("LURAX_PILOT_VVIP");
            const n = document.getElementById('copy-note');
            n.style.opacity = 1; setTimeout(() => n.style.opacity=0, 2000);
            if(window.navigator.vibrate) window.navigator.vibrate(50); // 26. Haptic
        }

        // 16. Particle
        document.addEventListener('touchstart', (e) => {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = e.touches[0].clientX+'px';
            p.style.top = e.touches[0].clientY+'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        });

        // 3. Matrix
        function startMatrix() {
            const c = document.getElementById('matrix-canvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const d = Array(Math.floor(c.width/10)).fill(1);
            setInterval(() => {
                ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,c.width,c.height);
                ctx.fillStyle = "#ff003c"; ctx.font = "10px monospace";
                d.forEach((y, i) => {
                    ctx.fillText(Math.random()>0.5?"1":"0", i*10, y*10);
                    if(y*10>c.height && Math.random()>0.975) d[i]=0; d[i]++;
                });
            }, 50);
        }

        // 18. Anti-Inspect
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
